name: Build ARENA from master

# Rebuilds the runnable ARENA material (exercise/solution notebooks, solutions.py,
# and Streamlit instruction pages) from the master files held in the source repo
# `styme3279/ARENA_master_test`, then commits the result back into this repo.
#
# Triggers:
#   * repository_dispatch (event type `master-push`) — fired by the companion
#     workflow in ARENA_master_test on every push to its `main` branch.
#   * workflow_dispatch — run it by hand from the Actions tab (optionally pick
#     which chapters to build / which master ref to build from).
#   * schedule — a nightly safety-net rebuild in case a dispatch was missed.
#
# Required configuration (Settings → Secrets and variables → Actions):
#   * MASTER_REPO_TOKEN  (optional) — a token that can read ARENA_master_test.
#       Only needed if that repo is PRIVATE. For a public master repo the
#       built-in GITHUB_TOKEN is enough and this secret can be omitted.

on:
  repository_dispatch:
    types: [master-push]
  workflow_dispatch:
    inputs:
      chapters:
        description: 'Space-separated chapter numbers to build (e.g. "0 1"). Default: all.'
        required: false
        default: '0 1 2 3 4'
      master_ref:
        description: 'Ref (branch/tag/SHA) of ARENA_master_test to build from.'
        required: false
        default: 'main'
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC nightly

# Allow the job to push the generated files back into this repo.
permissions:
  contents: write

concurrency:
  group: build-from-master
  cancel-in-progress: true

env:
  MASTER_REPO: styme3279/ARENA_master_test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. This repo (the runnable/student repo we publish into).
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. The master/source repo, at the commit that triggered the build
      #    (client_payload.sha for dispatch, the manual input for a manual run,
      #    or `main` otherwise).
      - name: Checkout master repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MASTER_REPO }}
          path: _master
          fetch-depth: 1
          ref: ${{ github.event.client_payload.sha || github.event.inputs.master_ref || 'main' }}
          token: ${{ secrets.MASTER_REPO_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # The conversion tool itself only needs these (no torch/CUDA stack).
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml tabulate

      - name: Build notebooks and sync runnable material
        run: |
          chmod +x scripts/build_and_sync.sh
          scripts/build_and_sync.sh "_master" "." ${{ github.event.inputs.chapters || '0 1 2 3 4' }}

      # Clean up the master checkout so it never gets committed into this repo.
      - name: Remove master checkout
        if: always()
        run: rm -rf _master

      - name: Commit and push generated material
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit — repo already up to date."
            exit 0
          fi
          MASTER_SHA="${{ github.event.client_payload.sha || github.event.inputs.master_ref || 'main' }}"
          git commit -m "Build from ARENA_master_test@${MASTER_SHA}" \
                     -m "Auto-generated by .github/workflows/build-from-master.yml"
          git push
