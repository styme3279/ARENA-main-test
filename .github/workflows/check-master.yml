name: Check master builds

# Validates a PR before merge: regenerate the section(s) whose master files the
# PR changes, to verify they build without errors. This is a dry-run gate — it
# does NOT commit anything, it only reports pass/fail as a check on the PR.
#
# GitHub checks out the PR's merge result (PR merged into main) by default, so
# this reflects what build-master.yml will actually do on main after merge.
# Pushes to main are handled by build-master.yml, which regenerates AND commits.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/chapters/**/master_*.py'
      - 'infrastructure/chapters/**/master_*.ipynb'

# Read-only: this job must never write to the repo.
permissions:
  contents: read

concurrency:
  # Supersede an in-flight check if the PR is pushed again.
  group: check-master-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to diff base..head

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # The conversion tool only needs these (no torch/CUDA stack).
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml tabulate

      # Regenerate the section(s) whose master files changed in this PR, in the
      # ephemeral runner checkout only. We diff base..head to select exactly the
      # sections this PR touches. generate_master.sh exits non-zero if any
      # section errors, which fails the check. There is no commit step, so
      # nothing is ever written back.
      - name: Regenerate changed sections (no commit)
        run: |
          chmod +x scripts/generate_master.sh
          scripts/generate_master.sh --changed \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"
