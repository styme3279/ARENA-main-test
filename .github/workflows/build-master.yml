name: Build from master files

# When a master file (infrastructure/chapters/**/master_X_Y.{py,ipynb}) is
# pushed, regenerate that section's outputs — solutions.py, the Streamlit .md/.py
# pages, and the exercise/solution notebooks — and commit them back.
#
# The generated files are not master files, so the bot's commit does not match
# the path filter below and cannot re-trigger this workflow.

on:
  push:
    paths:
      - 'infrastructure/chapters/**/master_*.py'
      - 'infrastructure/chapters/**/master_*.ipynb'
  workflow_dispatch:
    inputs:
      chapters:
        description: 'Sections to rebuild (space-separated, e.g. "1.3.2 0.1"), or "all".'
        required: false
        default: 'all'

permissions:
  contents: write

concurrency:
  group: build-master-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff the pushed commit range

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # The conversion tool only needs these (no torch/CUDA stack).
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml tabulate

      - name: Generate outputs from master files
        run: |
          chmod +x scripts/generate_master.sh
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.chapters }}" = "all" ]; then
              scripts/generate_master.sh --all
            else
              scripts/generate_master.sh ${{ github.event.inputs.chapters }}
            fi
          else
            scripts/generate_master.sh --changed "${{ github.event.before }}" "${{ github.sha }}"
          fi

      # Runs even if generation reported an error, so any sections that DID
      # generate successfully are still committed (the job is still marked failed).
      - name: Commit and push generated files
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Auto-generate outputs from master files [skip ci]"
          git push
