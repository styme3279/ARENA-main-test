name: Check solutions compile

# On every push and pull request, byte-compile every solutions*.py across all
# chapters to catch syntax errors. This does NOT import or run them (so it needs
# no ARENA dependencies, GPU, or API keys) — it just verifies they're valid
# Python.

on:
  push:
    paths:
      - 'chapter*/exercises/**/solutions*.py'
      - 'scripts/check_solutions_compile.py'
      - '.github/workflows/check-solutions.yml'
  pull_request:
    paths:
      - 'chapter*/exercises/**/solutions*.py'
      - 'scripts/check_solutions_compile.py'
      - '.github/workflows/check-solutions.yml'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Byte-compile all solutions.py
        run: python scripts/check_solutions_compile.py
